<section class="pdf-editor" id="pdf-editor" style="display: none; flex-direction: column; height: 100vh; width: 100vw; overflow: hidden; background-color: #121212;">
    <div class="editor-header" style="display: flex; justify-content: space-between; align-items: center; background-color: #1e1e1e; padding: 10px 20px; border-bottom: 1px solid #2d2d2d; z-index: 100; flex-shrink: 0;">
        <div class="editor-title" style="display: flex; align-items: center; gap: 15px;">
            <button class="btn btn-secondary" id="back-to-list-btn">← Back to List</button>
            <h2 id="current-pdf-name" style="margin: 0; color: white; font-size: 1.25rem;">Document Name</h2>
        </div>
        <div class="editor-controls" style="display: flex; align-items: center; gap: 20px;">
            <div class="page-controls" style="display: flex; align-items: center; gap: 8px; color: white;">
                <button class="btn btn-sm btn-secondary" id="prev-page-btn">← Prev</button>
                <span id="page-info">Page 1 of 1</span>
                <button class="btn btn-sm btn-secondary" id="next-page-btn">Next →</button>
            </div>
            <div class="zoom-controls" style="display: flex; align-items: center; gap: 8px; color: white;">
                <button class="btn btn-sm btn-secondary" id="zoom-out-btn">-</button>
                <span id="zoom-level">100%</span>
                <button class="btn btn-sm btn-secondary" id="zoom-in-btn">+</button>
            </div>
            <div class="editor-actions" style="display: flex; gap: 10px;">
                <button class="btn btn-sm btn-danger" id="clear-all-fields-btn">Clear All</button>
                <button class="btn btn-success" id="download-btn">Download PDF</button>
            </div>
        </div>
    </div>

    <div class="full-page-viewer-container" style="flex-grow: 1; overflow: auto; padding: 20px; display: flex; justify-content: center; align-items: flex-start;">
        <div id="pdf-viewer" class="full-screen-pdf-viewer" style="position: relative; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5); background: #ffffff; margin: 0 auto;">
            <canvas id="pdf-canvas" style="display: block; max-width: 100%; height: auto !important;"></canvas>
            <div id="form-overlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: auto;"></div>
        </div>
    </div>
</section>
